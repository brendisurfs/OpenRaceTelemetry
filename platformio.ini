
[env:esp32dev]
platform = espressif32
board = arduino_nano_esp32
framework = arduino

upload_protocol = esptool
upload_port = /dev/cu.usbmodem101
monitor_speed = 115200
upload_speed = 115200

build_flags =
  -Wall
  -Wextra
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

; Don't let PlatformIO's monitor toggle DTR/RTS on port-open.
; On the ROM JTAG interface, DTR/RTS are wired straight to EN/GPIO0 —
; opening the monitor can itself force the chip back into download mode.
monitor_dtr = 0
monitor_rts = 0

; There's no external UART chip here (native USB only), so don't block
; waiting for a "port to reappear" — it can hang waiting on a signal
; that native-USB mode doesn't produce.
board_upload.wait_for_upload_port = false

; Ask esptool to explicitly force a hardware reset after flashing,
; rather than relying on default post-upload behavior.
upload_flags =
  --after
  hard_reset


lib_deps =
    Wire
    adafruit/Adafruit NeoPixel@^1.12.0
